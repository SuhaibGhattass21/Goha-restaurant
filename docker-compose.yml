services:
  app:
    build:
      context: .
      target: production
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - API_URL=${API_URL:-https://localhost/api/v1}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://localhost}
      - HTTPS_ENABLED=${HTTPS_ENABLED:-false}
      - HTTPS_KEY_PATH=${HTTPS_KEY_PATH:-}
      - HTTPS_CERT_PATH=${HTTPS_CERT_PATH:-}
      - HTTPS_PASSPHRASE=${HTTPS_PASSPHRASE:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$HTTPS_ENABLED\" = \"true\" ]; then curl -fk https://localhost:$${PORT:-3000}/health || exit 1; else curl -f http://localhost:$${PORT:-3000}/health || exit 1; fi"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - app-network
    volumes:
      # Mount scripts for emergency recovery (optional)
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./scripts:/app/scripts:ro
    expose:
      - "3000"
  proxy:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "-c", "sh /opt/goha-nginx-entrypoint/40-generate-config.sh && nginx -g 'daemon off;'"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - TLS_MODE=${TLS_MODE:-auto}
      - HTTPS_ENABLED=${HTTPS_ENABLED:-false}
      - TLS_CERT_PATH=${TLS_CERT_PATH:-/etc/nginx/certs/fullchain.pem}
      - TLS_KEY_PATH=${TLS_KEY_PATH:-/etc/nginx/certs/privkey.pem}
    volumes:
      - ./deploy/nginx/config:/opt/goha-nginx:ro
      - ./deploy/nginx/docker-entrypoint.d:/opt/goha-nginx-entrypoint:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

    networks:
      - app-network
      
volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
